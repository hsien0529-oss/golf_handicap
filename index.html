<html lang="zh-Hant">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>好爸爸高球隊 讓桿系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#222}
header{background:#2d7d46;padding:12px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
header .logo{color:#fff;font-size:1.3rem;font-weight:bold;text-decoration:none}
header nav{display:flex;gap:16px;flex-wrap:wrap}
header nav a{color:#c8e6c9;text-decoration:none;font-size:0.95rem}
header nav a:hover{color:#fff}
header nav a.active{color:#fff;font-weight:bold}
.editor-badge{color:#a5d6a7;font-size:0.85rem}
.editor-badge a{color:#fff;text-decoration:none}
main{max-width:900px;margin:24px auto;padding:0 16px}

/* Tab nav */
.tab-nav{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tab-nav button{padding:8px 18px;border:1px solid #2d7d46;background:#fff;color:#2d7d46;cursor:pointer;border-radius:6px;font-size:0.9rem}
.tab-nav button:hover{background:#e8f5e9}
.tab-nav button.active{background:#2d7d46;color:#fff}

/* Player selector */
.selector-grid{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.selector-grid label{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#fff;border:1px solid #ccc;border-radius:20px;cursor:pointer;font-size:0.9rem}
.selector-grid label:hover{border-color:#2d7d46}
.selector-grid input{accent-color:#2d7d46}

/* Cards */
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.card h2{margin-bottom:12px;font-size:1.1rem;color:#2d7d46;border-bottom:2px solid #a5d6a7;padding-bottom:6px}

/* Table */
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid #eee;font-size:0.9rem}
th{background:#f1f8f2;color:#2d7d46;font-weight:600}
tr:hover{background:#fafafa}
tr.no-data td{color:#999;text-align:center;padding:20px}

/* Matrix */
.matrix-wrap{overflow-x:auto}
.matrix-table{border-collapse:collapse;font-size:0.78rem}
.matrix-table th,.matrix-table td{padding:5px 8px;text-align:center;border:1px solid #ddd;min-width:44px}
.matrix-table th{background:#e8f5e9;color:#2d7d46}
.matrix-table .h{background:#f1f8f2;font-weight:600}
.matrix-table .讓{color:#e53935;font-weight:bold}
.matrix-table .受{color:#1565c0}
.matrix-table .平{color:#888}

/* Group result */
.group-result{margin-top:16px}
.pair-row{display:flex;gap:12px;padding:10px 14px;border-bottom:1px solid #eee;align-items:center;font-size:0.92rem}
.pair-row:last-child{border-bottom:none}
.pair-name{min-width:120px;font-weight:600;color:#333}
.pair-stroke{color:#2d7d46;font-weight:bold;font-size:1rem}
.pair-none{color:#999;font-size:0.85rem}

/* Buttons */
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem}
.btn-primary{background:#2d7d46;color:#fff}
.btn-primary:hover{background:#1b5e20}
.btn-danger{background:#c62828;color:#fff}
.btn-danger:hover{background:#b71c1c}
.btn-secondary{background:#eee;color:#333}
.btn-secondary:hover{background:#ddd}

/* Form */
.form-row{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap}
.form-row select,.form-row input{padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:0.9rem}
.form-row label{display:flex;align-items:center;gap:6px;white-space:nowrap}

/* History */
.history-item{padding:10px 0;border-bottom:1px solid #eee}
.history-item:last-child{border-bottom:none}
.history-ts{color:#999;font-size:0.78rem}
.history-title{font-weight:600;color:#2d7d46;margin:2px 0}
.history-desc{font-size:0.88rem;color:#555}

/* Editor panel */
.edit-section{margin-top:20px}
.delete-btn{color:#c62828;background:none;border:none;cursor:pointer;font-size:0.85rem;padding:2px 6px}
.delete-btn:hover{background:#ffebee;border-radius:4px}

/* Responsive */
@media(max-width:600px){
  .matrix-table{font-size:0.7rem}
  .matrix-table th,.matrix-table td{padding:3px 4px;min-width:36px}
}
</style>

// ====== JSONBin 雲端同步設定 ======
const BIN_ID  = '69f88116aaba8821976c7b81';
const API_KEY = '$2a$10$j.lUX2/2iCIOMIKUMHzLLeJg0EkOS6JUqnvg2HheEfZDFWvH2DNq2';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// 從 JSONBin 讀取讓桿資料
async function loadFromSheet() {
  try {
    const resp = await fetch(`${BIN_URL}/latest`, {
      headers: { 'X-Master-Key': API_KEY, 'X-Bin-Meta': 'false' }
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    // 兼容舊格式：直接是陣列；新格式：{ pairs: [...] }
    const pairs = Array.isArray(data) ? data : (data.pairs || []);
    return pairs.map(p => ({
      a: String(p.a || ''),
      b: String(p.b || ''),
      value: parseFloat(p.value) || 0,
      condition: p.condition || {},
      source: String(p.source || '')
    }));
  } catch(e) {
    console.error('loadFromSheet error:', e);
    return [];
  }
}

// 把讓桿資料寫回 JSONBin
async function saveToSheet(pairs) {
  try {
    const body = {
      pairs: pairs,
      updated: new Date().toISOString(),
      updatedBy: (typeof editor !== 'undefined' && editor) ? editor : 'unknown'
    };
    const resp = await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'X-Master-Key': API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!resp.ok) {
      console.error('saveToSheet failed:', resp.status, await resp.text());
      return false;
    }
    return true;
  } catch(e) {
    console.error('saveToSheet error:', e);
    return false;
  }
}

<script>
// ====== STATE ======
let currentPage = 'home';
let selectedPlayers = [];
let editor = localStorage.getItem('golf_editor') || null;

// ====== HELPERS ======
function pname(id) {
  const p = PLAYERS.find(p=>p.id===id);
  return p ? p.name : id;
}

function lookup(a, b) {
  for (const p of PAIRS) {
    if (p.a === a && p.b === b) {
      const v = p.value;
      if (v < 0) return {giver:a, receiver:b, strokes:Math.abs(v), cond:p.condition||{}};
      else if (v > 0) return {giver:b, receiver:a, strokes:Math.abs(v), cond:p.condition||{}};
      else return {giver:null, receiver:null, strokes:0, cond:p.condition||{}};
    }
    if (p.a === b && p.b === a) {
      const v = p.value;
      if (v < 0) return {giver:b, receiver:a, strokes:Math.abs(v), cond:p.condition||{}};
      else if (v > 0) return {giver:a, receiver:b, strokes:Math.abs(v), cond:p.condition||{}};
      else return {giver:null, receiver:null, strokes:0, cond:p.condition||{}};
    }
  }
  return null;
}

function fmtCond(c) {
  if (!c || (Object.keys(c).length===0)) return '';
  const bits = [];
  if (c.holes) bits.push(c.holes+'洞');
  if (c.white_tee) bits.push('白T:'+c.white_tee);
  return '（'+bits.join('、')+'）';
}

function fmtPair(a, b, value) {
  if (value < 0) return `${pname(a)} 讓 ${pname(b)} ${Math.abs(value)} 桿`;
  if (value > 0) return `${pname(b)} 讓 ${pname(a)} ${Math.abs(value)} 桿`;
  return `${pname(a)} 與 ${pname(b)} 平讓`;
}

function navigate(page) {
  if (currentPage === 'home' && page !== 'home') {
    // Leaving home: clear selection state
    selectedPlayers = [];
    const area = document.getElementById('group-result-area');
    if (area) area.innerHTML = '';
  }
  currentPage = page;
  document.querySelectorAll('header nav a').forEach(a=>a.classList.remove('active'));
  const el = document.getElementById('nav-'+page);
  if (el) el.classList.add('active');
  render();
}

function logout() {
  editor = null;
  localStorage.removeItem('golf_editor');
  navigate('home');
}

function render() {
  const app = document.getElementById('app');
  document.getElementById('editor-badge').style.display = editor ? 'inline' : 'none';
  document.getElementById('editor-name').textContent = editor || '';

  switch(currentPage) {
    case 'home': app.innerHTML = renderHome(); break;
    case 'matrix': app.innerHTML = renderMatrix(); break;
    case 'history': renderHistory(); break;
    case 'edit': app.innerHTML = renderEdit(); break;
    default: app.innerHTML = renderHome();
  }
  attachEvents();
}

// ====== PAGES ======
function renderHome() {
  return `
<div class="card">
  <h2>🏠 首頁</h2>
  <p style="margin-bottom:12px;color:#555">選擇球員以查看兩兩讓桿：</p>
  <div class="selector-grid">
    ${PLAYERS.map(p=>`
    <label>
      <input type="checkbox" value="${p.id}" onchange="togglePlayer(this.value, this.checked)">
      ${p.name}
    </label>`).join('')}
  </div>
  <button id="confirm-btn" class="btn btn-primary" style="margin-top:14px;font-size:1rem;padding:10px 24px;border-radius:8px;opacity:0.5;cursor:not-allowed" onclick="confirmPlayers()" disabled>
    確認顯示讓桿結果
  </button>
  <div id="group-result-area" style="margin-top:14px;display:none"></div>
</div>`;
}

function getPairs(ids) {
  const result = [];
  for (let i=0;i<ids.length;i++) {
    for (let j=i+1;j<ids.length;j++) {
      const a=ids[i], b=ids[j];
      const r = lookup(a, b);
      result.push({a, b, data:r});
    }
  }
  return result;
}

function confirmPlayers() {
  if (selectedPlayers.length < 2) return;
  const area = document.getElementById('group-result-area');
  if (!area) return;
  area.style.display = 'block';
  area.innerHTML = `
  <div class="group-result">
    ${getPairs(selectedPlayers).map(r=>{
      if (!r.data) {
        return `<div class="pair-row">
          <span class="pair-name">${pname(r.a)} vs ${pname(r.b)}</span>
          <span class="pair-none">尚無記錄</span>
        </div>`;
      }
      // 讓桿者一律放前面，永遠顯示「讓」
      const giver    = r.data.giver;
      const receiver = (giver === r.a) ? r.b : r.a;
      return `<div class="pair-row">
        <span class="pair-name">${pname(giver)} vs ${pname(receiver)}</span>
        <span class="pair-stroke">讓 ${r.data.strokes} 桿 ${fmtCond(r.data.cond)}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function togglePlayer(id, checked) {
  if (checked) selectedPlayers.push(id);
  else selectedPlayers = selectedPlayers.filter(x=>x!==id);

  // Always clear result on any toggle (force re-confirm)
  const area = document.getElementById('group-result-area');
  if (area) {
    area.innerHTML = '';
    area.style.display = 'none';
  }

  // Update confirm button state
  const btn = document.getElementById('confirm-btn');
  if (btn) {
    btn.disabled = selectedPlayers.length < 2;
    btn.style.opacity = selectedPlayers.length < 2 ? '0.5' : '1';
  }
}

function renderMatrix() {
  const pids = PLAYERS.map(p=>p.id);
  const grid = {};
  pids.forEach(a=>{ grid[a]={}; pids.forEach(b=>{ grid[a][b]=null }); });
  PAIRS.forEach(p=>{
    const {a,b,value,condition} = p;
    if (value<0) { grid[a][b]={t:'讓',v:Math.abs(value),c:condition}; grid[b][a]={t:'受',v:Math.abs(value),c:condition} }
    else if (value>0) { grid[a][b]={t:'受',v:Math.abs(value),c:condition}; grid[b][a]={t:'讓',v:Math.abs(value),c:condition} }
    else { grid[a][b]={t:'平',v:0,c:condition}; grid[b][a]={t:'平',v:0,c:condition} }
  });

  return `
<div class="card">
  <h2>📊 讓桿矩陣</h2>
  <div class="matrix-wrap">
    <table class="matrix-table">
      <thead><tr><th></th>${pids.map(id=>`<th class="h">${pname(id)}</th>`).join('')}</tr></thead>
      <tbody>
        ${pids.map(a=>`
        <tr>
          <th class="h">${pname(a)}</th>
          ${pids.map(b=>{
            if (a===b) return '<td>—</td>';
            const cell = grid[a][b];
            if (!cell) return '<td></td>';
            const cls = cell.t;
            const title = fmtCond(cell.c);
            return `<td class="${cls}" title="${title}">${cell.t}${cell.v>0?cell.v:''}</td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
  <p style="margin-top:10px;font-size:0.8rem;color:#888">讓=讓桿者 / 受=受讓者 / 平=平讓 | 紅色=讓、藍色=受、灰=平</p>
</div>`;
}

function deleteHistory(idx) {
  let history = JSON.parse(localStorage.getItem('golf_history') || '[]');
  if (idx < 0 || idx >= history.length) return;
  const entry = history[idx];

  // 若有快照，还原 PAIRS
  if (entry.pairsSnapshot) {
    PAIRS.length = 0;
    entry.pairsSnapshot.forEach(p => PAIRS.push(p));
    saveData();
  }

  history.splice(idx, 1);
  localStorage.setItem('golf_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  let history = JSON.parse(localStorage.getItem('golf_history') || '[]');
  if (history.length===0) {
    document.getElementById('app').innerHTML = `<div class="card"><h2>📋 操作紀錄</h2><p style="color:#999">尚無任何操作記錄</p></div>`;
    return;
  }
  document.getElementById('app').innerHTML = `
<div class="card">
  <h2>📋 操作紀錄（${history.length} 筆）</h2>
  ${history.map((e,i)=>`
  <div class="history-item">
    <div class="history-ts">${e.ts}　${e.editor ? '📝 '+e.editor : ''}</div>
    <div class="history-title">${e.title}</div>
    <div class="history-desc">${e.desc}</div>
    <button class="delete-btn" onclick="deleteHistory(${i})">✕ 刪除</button>
  </div>`).join('')}
</div>`;
}


function renderEdit() {
  if (!editor) {
    return `
<div class="card">
  <h2>🔐 選擇編輯者</h2>
  <p style="margin-bottom:12px">請選擇操作者身份：</p>
  <div class="selector-grid">
    ${PLAYERS.map(p=>`
    <button class="btn btn-primary" onclick="login('${p.id}')" style="padding:10px 20px;font-size:1rem;border-radius:8px">${p.name}</button>`).join('')}
  </div>
</div>`;
  }
  return `
<div class="card">
  <h2>✏️ 編輯讓桿</h2>
  <p style="margin-bottom:10px;color:#555">選擇兩位球員後修改讓桿值：</p>
  <div class="form-row">
    <label>球員 A：<select id="edit-a" onchange="updateEditPreview()">${PLAYERS.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></label>
    <label>球員 B：<select id="edit-b" onchange="updateEditPreview()">${PLAYERS.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></label>
    <label>讓桿值：<input type="number" id="edit-val" value="0" min="-20" max="20" style="width:60px" onchange="updateEditPreview()"></label>
    <label>備註：<input type="text" id="edit-note" placeholder="來源說明"></label>
  </div>
  <div id="edit-preview" style="margin:10px 0;padding:10px;background:#f1f8f2;border-radius:6px;font-size:0.95rem"></div>
  <div class="form-row">
    <button class="btn btn-primary" onclick="savePair()">儲存</button>
  </div>
</div>

<div class="card">
  <h2>📋 所有讓桿記錄（${PAIRS.length} 筆）</h2>
  <table>
    <thead><tr><th>球員 A</th><th>球員 B</th><th>讓桿</th><th>備註</th></tr></thead>
    <tbody>
      ${PAIRS.map((p,i)=>{
        const r = lookup(p.a, p.b);
        const giver = r ? r.giver : null;
        const strokes = r ? r.strokes : 0;
        const rel = giver===p.a ? '讓' : (giver ? '受' : '平');
        return `
      <tr>
        <td>${pname(p.a)}</td>
        <td>${pname(p.b)}</td>
        <td style="color:${rel==='讓'?'#e53935':rel==='受'?'#1565c0':'#888'};font-weight:bold">${rel} ${strokes}</td>
        <td style="color:#888;font-size:0.82rem">${p.source||''}</td>
      </tr>`;
      }).join('')}
    </tbody>
  </table>
</div>`;
}

// ====== EDITOR ACTIONS ======
function login(pid) {
  editor = pid;
  localStorage.setItem('golf_editor', pid);
  navigate('edit');
}

function updateEditPreview() {
  const a = document.getElementById('edit-a').value;
  const b = document.getElementById('edit-b').value;
  const v = parseInt(document.getElementById('edit-val').value)||0;
  const preview = document.getElementById('edit-preview');
  if (!preview) return;
  if (a===b) { preview.textContent='請選擇不同球員'; preview.style.color='#c62828'; return; }
  const r = lookup(a, b);
  const oldStr = r ? (r.giver===a ? `讓 ${r.strokes}` : `受 ${r.strokes}`) : '尚無記錄';
  const newStr = v<0 ? `${pname(a)} 讓 ${pname(b)} ${Math.abs(v)} 桿` : v>0 ? `${pname(b)} 讓 ${pname(a)} ${v} 桿` : '平讓';
  preview.innerHTML = `目前：${oldStr} → 儲存後：<strong>${newStr}</strong>`;
  preview.style.color='#222';
}

async function savePair() {
  const a = document.getElementById('edit-a').value;
  const b = document.getElementById('edit-b').value;
  const v = parseInt(document.getElementById('edit-val').value)||0;
  const note = document.getElementById('edit-note').value;
  if (a===b) { alert('請選擇不同球員'); return; }

  const idx = PAIRS.findIndex(p=>p.a===a && p.b===b);
  const oldPair = idx>=0 ? PAIRS[idx] : null;
  const newPair = {a, b, value:v, condition:{}, source:note||'manual'};

  if (idx>=0) {
    const snapshot = JSON.parse(JSON.stringify(PAIRS)); // 先快照「修改前」
    PAIRS[idx] = newPair;
    pushHistory('修改讓桿', `${fmtPair(a,b,oldPair?oldPair.value:0)} → ${fmtPair(a,b,v)}${fmtCond(newPair.condition)}`, snapshot);
  } else {
    PAIRS.push(newPair);
    pushHistory('新增讓桿', `${fmtPair(a,b,v)}${fmtCond(newPair.condition)}`);
  }
  saveData();
  alert('儲存成功！');
  navigate('edit');
}

async function deletePair() {
  const a = document.getElementById('edit-a').value;
  const b = document.getElementById('edit-b').value;
  if (!confirm(`確定刪除 ${pname(a)} 與 ${pname(b)} 的讓桿記錄？`)) return;
  const idx = PAIRS.findIndex(p=>p.a===a && p.b===b);
  if (idx>=0) {
    const deleted = PAIRS.splice(idx,1)[0];
    pushHistory('刪除讓桿', fmtPair(a,b,deleted.value));
    saveData();
    navigate('edit');
  }
}

async function deletePairByIdx(idx) {
  const p = PAIRS[idx];
  if (!confirm(`確定刪除 ${pname(p.a)} 與 ${pname(p.b)} 的讓桿記錄？`)) return;
  const deleted = PAIRS.splice(idx,1)[0];
  pushHistory('刪除讓桿', fmtPair(p.a,p.b,deleted.value), JSON.parse(JSON.stringify(PAIRS)));
  saveData();
  navigate('edit');
}

function pushHistory(title, desc, pairsSnapshot) {
  const h = JSON.parse(localStorage.getItem('golf_history')||'[]');
  h.push({
    ts: new Date().toISOString().replace('T',' ').slice(0,19),
    title,
    desc,
    editor,
    pairsSnapshot: pairsSnapshot || null   // 若有快照，刪除此筆时可还原
  });
  localStorage.setItem('golf_history', JSON.stringify(h.slice(-200)));
}

async function saveData() {
  localStorage.setItem('golf_pairs', JSON.stringify(PAIRS));
  await saveToSheet(PAIRS);
}

function attachEvents() {
  // re-attach any dynamic events
}

// ====== INIT ======
// Restore editor
if (localStorage.getItem('golf_editor')) {
  editor = localStorage.getItem('golf_editor');
}

async function init() {
  const sheetPairs = await loadFromSheet();
  if (sheetPairs.length > 0) {
    PAIRS.length = 0;
    sheetPairs.forEach(p => PAIRS.push(p));
    localStorage.setItem('golf_pairs', JSON.stringify(PAIRS));
  } else {
    // Fallback: load from localStorage
    const saved = localStorage.getItem('golf_pairs');
    if (saved) {
      try {
        const arr = JSON.parse(saved);
        if (arr.length > 0) {
          PAIRS.length = 0;
          arr.forEach(p => PAIRS.push(p));
        }
      } catch(e) {}
    }
  }
  render();
}
init();
</script>
